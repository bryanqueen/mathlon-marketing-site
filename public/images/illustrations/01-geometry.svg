<svg width="400" height="400" viewBox="0 0 400 400" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Geometry illustration</title>
<desc>Hand-drawn geometric sketch with triangle, angle marks, and compass arc</desc>
<defs>
  <style>
    .ink { stroke: #1a1a2e; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .lbl { font-family: 'Patrick Hand', 'Caveat', cursive; fill: #1a1a2e; font-size: 15px; }
    .lbl-sm { font-family: 'Patrick Hand', 'Caveat', cursive; fill: #555; font-size: 12px; }
    .eq { font-family: 'Patrick Hand', 'Caveat', cursive; fill: #1a1a2e; font-size: 13px; font-style: italic; }
  </style>
</defs>

<!-- Main triangle -->
<path d="M80 310 Q82 308 200 80 Q202 79 320 310 Q319 312 80 310Z"
      class="ink" stroke-width="2.2" fill="#e8f0fb" />

<!-- right angle box at bottom-left -->
<path d="M80 310 L94 310 L94 296" class="ink" stroke-width="1.4"/>

<!-- angle arc at top vertex -->
<path d="M188 104 Q200 116 212 104" class="ink" stroke-width="1.3" fill="none"/>
<text x="194" y="120" class="eq" style="font-size:13px;fill:#c0392b">α</text>

<!-- angle arc at bottom-right -->
<path d="M303 310 Q306 296 318 294" class="ink" stroke-width="1.3"/>
<text x="292" y="304" class="eq" style="font-size:13px;fill:#2980b9">β</text>

<!-- right angle label -->
<text x="60" y="307" class="eq" style="font-size:13px;fill:#27ae60">90°</text>

<!-- side labels -->
<text x="124" y="218" class="eq" style="fill:#c0392b">a</text>
<text x="265" y="218" class="eq" style="fill:#2980b9">b</text>
<text x="192" y="328" class="eq" style="fill:#27ae60">c</text>

<!-- compass arc suggestion in background -->
<path d="M200 310 Q270 240 320 310" class="ink" stroke-width="1" stroke-dasharray="5,4" style="stroke:#aaa"/>

<!-- formula -->
<text x="100" y="365" class="eq" style="font-size:14px">a² + b² = c²</text>



<!-- small angle ticks on equal sides (isoceles hint) -->
<line x1="148" y1="196" x2="156" y2="192" class="ink" stroke-width="1.5"/>
<line x1="244" y1="194" x2="252" y2="198" class="ink" stroke-width="1.5"/>

</svg>
