<svg width="400" height="420" viewBox="0 0 400 420" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Potted cactus</title>
<desc>Hand-drawn potted cactus with spines and a tiny flower on top</desc>
<defs>
  <style>
    .ink { stroke: #1a1a2e; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .lbl { font-family: 'Patrick Hand','Caveat',cursive; fill: #1a1a2e; font-size: 13px; }
  </style>
</defs>

<!-- pot -->
<path d="M138 320 Q136 316 144 312 Q172 308 200 308 Q228 308 256 312 Q264 316 262 320 Q270 358 268 374 Q266 386 200 388 Q134 386 132 374 Q130 358 138 320Z"
      class="ink" stroke-width="2.2" fill="#e8845a" style="fill:#e8845a"/>
<!-- pot rim -->
<path d="M134 320 Q136 312 200 310 Q264 312 266 320 Q264 330 200 332 Q136 330 134 320Z"
      class="ink" stroke-width="1.8" fill="#f0a882" style="fill:#f0a882"/>
<!-- pot shadow lines -->
<path d="M148 340 Q146 365 148 378" class="ink" stroke-width="0.9" style="stroke:#c06030;opacity:0.5"/>
<path d="M165 338 Q163 368 165 380" class="ink" stroke-width="0.9" style="stroke:#c06030;opacity:0.5"/>

<!-- soil -->
<path d="M148 318 Q150 314 200 313 Q250 314 252 318 Q252 326 200 328 Q148 326 148 318Z"
      class="ink" stroke-width="1.2" fill="#6b4226" style="fill:#6b4226"/>

<!-- main cactus trunk -->
<path d="M178 314 Q174 260 176 200 Q176 148 178 100 Q180 72 200 68 Q220 72 222 100 Q224 148 224 200 Q226 260 222 314Z"
      class="ink" stroke-width="2.2" fill="#5a9e50" style="fill:#5a9e50"/>

<!-- left arm -->
<path d="M178 220 Q148 218 136 210 Q122 196 124 176 Q126 158 140 156 Q154 154 158 166 Q160 176 178 178"
      class="ink" stroke-width="2.2" fill="#5a9e50" style="fill:#5a9e50"/>

<!-- right arm -->
<path d="M222 240 Q252 238 264 228 Q278 214 276 192 Q274 172 260 170 Q246 168 244 180 Q242 192 222 194"
