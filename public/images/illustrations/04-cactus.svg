<!-- cactus texture lines on trunk -->
<path d="M186 280 Q188 260 186 240" class="ink" stroke-width="0.8" style="stroke:#3d7a34"/>
<path d="M200 285 Q202 260 200 235" class="ink" stroke-width="0.8" style="stroke:#3d7a34"/>
<path d="M214 280 Q212 260 214 240" class="ink" stroke-width="0.8" style="stroke:#3d7a34"/>
<path d="M186 220 Q188 195 186 170" class="ink" stroke-width="0.8" style="stroke:#3d7a34"/>
<path d="M200 225 Q202 195 200 165" class="ink" stroke-width="0.8" style="stroke:#3d7a34"/>
<path d="M214 220 Q212 195 214 170" class="ink" stroke-width="0.8" style="stroke:#3d7a34"/>

<!-- spines on trunk -->
<line x1="176" y1="145" x2="162" y2="138" class="ink" stroke-width="1"/>
<line x1="176" y1="155" x2="161" y2="152" class="ink" stroke-width="1"/>
<line x1="224" y1="145" x2="238" y2="138" class="ink" stroke-width="1"/>
<line x1="224" y1="155" x2="239" y2="152" class="ink" stroke-width="1"/>
<line x1="176" y1="255" x2="161" y2="248" class="ink" stroke-width="1"/>
<line x1="224" y1="255" x2="239" y2="248" class="ink" stroke-width="1"/>
<line x1="176" y1="195" x2="161" y2="190" class="ink" stroke-width="1"/>
<line x1="224" y1="200" x2="240" y2="194" class="ink" stroke-width="1"/>

<!-- spines on left arm -->
<line x1="140" y1="175" x2="132" y2="166" class="ink" stroke-width="1"/>
<line x1="148" y1="168" x2="142" y2="158" class="ink" stroke-width="1"/>
<line x1="140" y1="185" x2="130" y2="182" class="ink" stroke-width="1"/>

<!-- spines on right arm -->
<line x1="260" y1="188" x2="268" y2="178" class="ink" stroke-width="1"/>
<line x1="252" y1="180" x2="258" y2="170" class="ink" stroke-width="1"/>
<line x1="260" y1="198" x2="270" y2="196" class="ink" stroke-width="1"/>

<!-- flower on top -->
<circle cx="200" cy="60" r="10" class="ink" stroke-width="1.5" fill="#f06090" style="fill:#f06090"/>
<path d="M200 50 Q196 42 192 44 Q188 48 192 54" class="ink" stroke-width="1.2" fill="#f06090" style="fill:#f9b4cc"/>
<path d="M200 50 Q204 42 208 44 Q212 48 208 54" class="ink" stroke-width="1.2" fill="#f9b4cc" style="fill:#f9b4cc"/>
<path d="M190 60 Q182 56 182 50 Q184 44 190 46" class="ink" stroke-width="1.2" fill="#f9b4cc" style="fill:#f9b4cc"/>
<path d="M210 60 Q218 56 218 50 Q216 44 210 46" class="ink" stroke-width="1.2" fill="#f9b4cc" style="fill:#f9b4cc"/>
<circle cx="200" cy="57" r="6" class="ink" stroke-width="1.2" fill="#f5c040" style="fill:#f5c040"/>

</svg>
